
#
# Key Bindings
#

# change prefix key to C-a, easier to type, same to "screen"
unbind C-b
set-option -g prefix C-a

# for nested tmux
bind C-a send-prefix

# split window
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

# select pane
bind -r C-k select-pane -U
bind -r C-j select-pane -D
bind -r C-h select-pane -L
bind -r C-l select-pane -R

# alt+num to select window
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9
bind -n M-0 select-window -t :=10

# alt+shift+num to move current pane into window N as a horizontal split
bind-key -n M-! join-pane -h -t :=1
bind-key -n M-@ join-pane -h -t :=2
bind-key -n M-# join-pane -h -t :=3
bind-key -n M-$ join-pane -h -t :=4
bind-key -n M-% join-pane -h -t :=5
bind-key -n M-^ join-pane -h -t :=6
bind-key -n M-& join-pane -h -t :=7
bind-key -n M-* join-pane -h -t :=8
bind-key -n M-( join-pane -h -t :=9
bind-key -n M-) join-pane -h -t :=10

# swap pane
bind C-u swap-pane -U
bind C-d swap-pane -D

# break pane
unbind !
bind b break-pane

# join marked window
bind j join-pane -h

# synchronize panes
bind S set-window-option synchronize-panes

# toggle pane read-only
unbind l
bind l if-shell -F "#{pane_input_off}" \
    "select-pane -e" \
    "select-pane -d"

# Open current buffer with nvim
bind C-v capture-pane -S -102400 -J \; new-window -a 'nvim -c ":read !tmux save-buffer - ; tmux delete-buffer;" -c ":normal gg" -c ":set buftype=nofile" -c ":silent! ChompWhitespace"'

# new window and retain cwd
bind c new-window -c "#{session_path}"

# prompt to rename window right after it's created
#set-hook -g after-new-window 'command-prompt -I "#{window_name}" "rename-window '%%'"'

# rename session and window
unbind ,
bind r command-prompt -I "#{window_name}" "rename-window '%%'"
unbind "\$"
bind R command-prompt -I "#{session_name}" "rename-session '%%'"

# find session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# reload tmux configuration
bind C-r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# for KVM prompt
bind k send-keys C-a c

# Vim mode
set-option -g status-keys vi
set-window-option -g mode-keys vi

bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind p
bind p paste-buffer
# unbind [
# unbind ]


#
# General Settings
#
set-option -g default-terminal          "xterm-256color"
# make colors inside tmux look the same as outside of tmux
# see https://github.com/tmux/tmux/issues/696
# see https://stackoverflow.com/a/41786092
set-option -ga terminal-overrides ",*-256color:Tc"
set-option -ga terminal-features  ",*-256color:RGB"

set-option -g history-limit             65535
set-option -g aggressive-resize         on

# automatically renumbers windows sequentially when one is closed
#set-option -g renumber-windows          on

# faster command sequences
set-option -s escape-time               0

set-option -g assume-paste-time         0

# start index of window/pane with 1, because we're humans, not computers
set-option -g base-index                1
set-window-option -g pane-base-index    1

# prefer vi style key table
set-option -g mode-keys vi

# disable mouse support
set-option -g mouse                     off

set-option -g set-clipboard external

# windows with activity are highlighted in the status line.
set-option -g monitor-activity          off

# set parent terminal title to reflect current window in tmux session
set-option -g set-titles                on
set-option -g set-titles-string         "#I:#W"

# color scheme from https://github.com/gkeep/iceberg-dark
source-file ~/.config/tmux/iceberg_minimal.tmux.conf

# set-option -g status-bg                 black
# set-option -g status-fg                 brightblue
set-option -g status-interval           1
set-option -g status-justify            left
set-option -g status-keys               vi
# set-option -g status-position           bottom
# set-option -g status-left               "#[fg=white][#[fg=brightblue,dim]#S#[fg=white]]#[default] "
# set-option -g status-right              "#[fg=white][#[fg=brightblue]#H#[fg=white]] #[fg=brightblue,dim]%Y-%m-%d %H:%M:%S#[default]"

# message text
set-option -g message-style             bg=black,fg=brightblue

# window title colors
# set-option -g window-status-style           fg=brightblack,bg=default
# set-option -g window-status-current-style   fg=brightblue,bg=default

# pane border
# set-option -g pane-border-style             fg=brightblack
# set-option -g pane-active-border-style      fg=brightblue
set-option -g pane-border-lines heavy       # pane-border("single", "double", "heavy", "simple", "number", NULL)

# pane number display
set-option -g display-panes-colour          brightblack
set-option -g display-panes-active-colour   brightblue

setenv -g SSH_AUTH_SOCK "$HOME/.ssh/ssh_auth_sock"
set-option -g update-environment -r

